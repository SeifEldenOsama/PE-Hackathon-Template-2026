version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/hackathon_db
    depends_on:
      - db
    ports:
      - "5000:5000"
volumes:
  postgres_data:
